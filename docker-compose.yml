services:
  db:
    image: postgres:16-alpine
    container_name: todolist02-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: todouser
      POSTGRES_PASSWORD: todopass123
      POSTGRES_DB: todolist02
    volumes:
      - pgdata02:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todouser -d todolist02"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: todolist02-backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: todouser
      DB_PASSWORD: todopass123
      DB_NAME: todolist02
      JWT_SECRET: todolist02-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: todolist02-frontend
    restart: unless-stopped
    ports:
      - "5174:5174"
    depends_on:
      - backend

volumes:
  pgdata02:

networks:
  # Rede interna do ambiente de dev (sem isso o compose criaria a mesma coisa
  # com o nome gerado "<pasta>_default"). Explícita = visível no código.
  default:
    name: todolist02_dev
