server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API — repassa para o container do backend (mesma rede do compose)
    location /api/ {
        proxy_pass http://backend:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # PWA: index.html e service worker nunca podem ficar presos em cache,
    # senão o usuário não recebe versões novas do app
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # Assets com hash no nome podem ser cacheados para sempre
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA: qualquer rota desconhecida cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
